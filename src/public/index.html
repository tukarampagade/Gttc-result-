<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GTTC Result Management System</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="/assets/css/themes.css" />
  </head>

  <body>
    <div
      class="bg-dark py-2 text-white small text-center fw-bold text-uppercase tracking-widest"
    >
      Government Tool Room & Training Centre, Karnataka
    </div>
    <div
      class="container d-flex align-items-center justify-content-center min-vh-100"
    >
      <div class="card login-card w-100">
        <div class="card-body p-5">
          <div class="text-center mb-5">
            <div class="mb-3">
              <img
                src="https://www.gttcmsdc.com/public/nusrat-assets/img/logo2.jpg"
                alt="GTTC Logo"
                class="img-fluid mb-3"
                style="
                  max-height: 100px;
                  filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
                "
                referrerpolicy="no-referrer"
              />
            </div>
            <h2 class="fw-bold text-uppercase tracking-wider mb-1">
              Government Tool Room & Training Centre
            </h2>
            <p class="text-muted small text-uppercase tracking-widest">
              Skill for the Technology of the Future
            </p>
            <hr class="mx-auto w-25" />
          </div>
          <form id="loginForm">
            <div class="mb-4">
              <label class="form-label fw-medium text-dark"
                >Roll / Registration Number</label
              >
              <input
                type="text"
                class="form-control py-2 px-3"
                id="username"
                placeholder="e.g., 8080142"
                required
              />
            </div>
            <div class="mb-4">
              <label class="form-label fw-medium text-dark">Full Name</label>
              <input
                type="password"
                class="form-control py-2 px-3"
                id="password"
                placeholder="Enter your full name"
                required
              />
            </div>
            <div class="mb-5">
              <label class="form-label fw-medium text-dark">Semester</label>
              <select class="form-select py-2 px-3" id="semester">
                <option selected>Any Semester</option>
                <option value="1st">1st Semester</option>
                <option value="2nd">2nd Semester</option>
                <option value="3rd">3rd Semester</option>
                <option value="4th">4th Semester</option>
                <option value="5th">5th Semester</option>
                <option value="6th">6th Semester</option>
              </select>
            </div>
            <button
              type="submit"
              class="btn btn-primary w-100 py-3 fw-bold text-uppercase tracking-wide mb-4"
            >
              View Result <i class="bi bi-arrow-right ms-2"></i>
            </button>
            <div class="text-center">
              <a
                href="/admin/login.html"
                class="text-decoration-none text-muted small hover-primary"
              >
                <i class="bi bi-shield-lock me-1"></i> Admin Access
              </a>
            </div>
          </form>
          <div id="message" class="mt-4 text-center"></div>
        </div>
      </div>
    </div>

    <footer class="container-fluid py-4 mt-auto border-top bg-white">
      <div
        class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-3"
      >
        <div class="text-muted small">
          © 2026 GTTC Belgaum — Result Management System, and created by Tukaram
          Pagade
        </div>
        <div>
          <a
            href="/admin/login.html"
            class="btn btn-sm btn-outline-dark text-uppercase fw-bold tracking-wider"
            style="font-size: 0.7rem"
          >
            Admin Portal <i class="bi bi-box-arrow-in-right ms-1"></i>
          </a>
        </div>
      </div>
    </footer>

    <script src="/assets/js/theme.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/auth.js"></script>
  </body>
</html>
