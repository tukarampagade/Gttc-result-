<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result Portal - GTTC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; }
            .card { border: none !important; box-shadow: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">
    <div class="no-print bg-slate-900 py-2 text-white text-[10px] text-center font-bold uppercase tracking-[0.2em] relative">
        Government Tool Room & Training Centre, Karnataka
        <div class="absolute left-4 top-1/2 -translate-y-1/2 flex items-center gap-2">
            <div class="w-2.5 h-2.5 rounded-full" id="liveRgbIcon" style="animation: rgbPulse 2s infinite; border: 1px solid rgba(255,255,255,0.3);"></div>
            <input type="color" id="themeColorPicker" class="w-4.5 h-4.5 rounded cursor-pointer border-none bg-transparent" title="Change Theme Color">
            <button class="text-white hover:text-slate-300 transition-colors" onclick="toggleDarkMode()" title="Toggle Dark Mode">
                <i id="darkModeIcon" class="bi bi-moon-stars"></i>
            </button>
        </div>
        <style>
            @keyframes rgbPulse {
                0% { background-color: #ff0000; box-shadow: 0 0 10px #ff0000; transform: scale(0.9); }
                33% { background-color: #00ff00; box-shadow: 0 0 10px #00ff00; transform: scale(1.1); }
                66% { background-color: #0000ff; box-shadow: 0 0 10px #0000ff; transform: scale(0.9); }
                100% { background-color: #ff0000; box-shadow: 0 0 10px #ff0000; transform: scale(0.9); }
            }
        </style>
    </div>
    
    <nav class="no-print bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-3">
                   <img src="https://www.gttcmsdc.com/public/nusrat-assets/img/logo2.jpg" alt="Logo" class="h-10 w-10 rounded-lg shadow-sm" referrerPolicy="no-referrer">
                    <div>
                        <h1 class="text-slate-900 font-bold text-sm sm:text-base leading-tight">GTTC Result Portal</h1>
                        <p class="text-slate-500 text-[10px] uppercase tracking-wider font-semibold">Skill for the Future</p>
                    </div>
                </div>
                <button onclick="logout()" class="flex items-center gap-2 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100 rounded-xl transition-all">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8">
        <div id="resultContent">
            <div class="flex items-center justify-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-4 border-slate-200 border-t-slate-900"></div>
            </div>
        </div>
        
        <div id="historyContent" class="mt-8"></div>
    </main>

    <footer class="no-print bg-white border-t border-slate-200 py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <p class="text-slate-500 text-sm">© 2026 GTTC Belgaum — Result Management System</p>
            <div class="flex items-center gap-4">
                <span class="text-slate-400 text-[10px] uppercase tracking-widest font-bold">Created by Tukaram Pagade</span>
            </div>
        </div>
    </footer>

    <script src="/assets/js/theme.js"></script>
    <script src="/assets/js/api.js"></script>
    <script src="/assets/js/results.js"></script>
</body>
</html>
